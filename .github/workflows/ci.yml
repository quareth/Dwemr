name: CI

on:
  push:
  pull_request:

jobs:
  dwemr-plugin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/dwemr

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: plugins/dwemr/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run typecheck
        run: npm run typecheck

      - name: Verify package contents
        run: npm pack --dry-run
